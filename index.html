<style>
body { font-family: Arial; background: #fff8f0; margin:0; }
.header { background:#8b4513; color:white; text-align:center; padding:15px; font-size:22px; }
.container { max-width:500px; margin:auto; padding:15px; }
.product { background:white; margin-bottom:15px; padding:10px; border-radius:10px; box-shadow:0 0 5px #ccc; }
.product img { width:100%; border-radius:10px; }
.price { color:#8b4513; font-weight:bold; margin:5px 0; }
select, input { width:100%; padding:10px; margin-top:10px; border-radius:8px; border:1px solid #ccc; }
button { width:100%; padding:12px; background:#25d366; color:white; border:none; border-radius:10px; margin-top:15px; font-size:16px; cursor:pointer; }

/* سلايدر الصور */
.slider { position: relative; width: 100%; height: 200px; overflow: hidden; border-radius:10px; margin-bottom:15px; }
.slides { display: flex; width: 300%; transition: transform 0.5s ease-in-out; }
.slides img { width: 100%; flex-shrink:0; }

    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3b/Honey.jpg" alt="عسل الحبة السوداء">

</select>

<select id="deliveryType" onchange="updatePrice()">
<option value="">نوع التوصيل</option>
<option value="home">توصيل للمنزل</option>
<option value="desk">توصيل لمكتب التوصيل</option>
</select>

<div id="deliveryPrice" style="margin-top:10px; font-weight:bold;"></div>
</div>

<button onclick="sendOrder()">اطلب الآن عبر واتساب</button>

</div>

<script>
// سلايدر تلقائي
let current = 0;
function showSlide(index){
  const slides = document.getElementById("slides");
  slides.style.transform = "translateX(-" + (index*100) + "%)";
}
setInterval(function(){
  current = (current+1)%3;
  showSlide(current);
},3000);

// أسعار التوصيل لكل 58 ولاية
const prices = {
  Adrar:{home:1400,desk:1100},Chlef:{home:850,desk:450},Laghouat:{home:1000,desk:700},Oum El Bouaghi:{home:850,desk:500},
  Batna:{home:850,desk:500},Béjaïa:{home:850,desk:500},Biskra:{home:950,desk:600},Béchar:{home:1400,desk:1100},
  Blida:{home:500,desk:400},Bouira:{home:850,desk:450},Tamanrasset:{home:1800,desk:1400},Tébessa:{home:950,desk:600},
  Tlemcen:{home:850,desk:500},Tiaret:{home:850,desk:500},Tizi Ouzou:{home:850,desk:450},Alger:{home:700,desk:400},
  Djelfa:{home:900,desk:600},Jijel:{home:850,desk:500},Sétif:{home:850,desk:450},Saïda:{home:900,desk:600},
  Skikda:{home:850,desk:500},Sidi Bel Abbès:{home:850,desk:500},Annaba:{home:850,desk:500},Guelma:{home:900,desk:600},
  Constantine:{home:850,desk:450},Médéa:{home:850,desk:450},Mostaganem:{home:850,desk:500},M'Sila:{home:850,desk:500},
  Mascara:{home:900,desk:600},Ouargla:{home:1100,desk:800},Oran:{home:850,desk:450},El Bayadh:{home:1100,desk:800},
  Illizi:{home:2000,desk:1700},Bordj Bou Arreridj:{home:850,desk:450},Boumerdès:{home:850,desk:450},El Tarf:{home:950,desk:600},
  Tindouf:{home:1800,desk:1400},Tissemsilt:{home:850,desk:500},El Oued:{home:1100,desk:800},Khenchela:{home:900,desk:600},
  Souk Ahras:{home:900,desk:600},Tipaza:{home:700,desk:400},Mila:{home:850,desk:500},Aïn Defla:{home:850,desk:450},
  Naâma:{home:1100,desk:800},Aïn Témouchent:{home:900,desk:600},Ghardaïa:{home:1100,desk:800},Relizane:{home:850,desk:500},
  Timimoun:{home:1400,desk:1100},Ouled Djellal:{home:1000,desk:700},Beni Abbes:{home:1400,desk:1100},In Salah:{home:1400,desk:1100},
  In Guezzam:{home:2000,desk:1700},Touggourt:{home:1100,desk:800},Djanet:{home:2000,desk:1700},El M'Ghair:{home:1100,desk:800},
  El Meniaa:{home:1300,desk:1000},Bordj T’lemcen:{home:900,desk:600}
};

function updatePrice() {
  let wilaya = document.getElementById("wilaya").value;
  let type = document.getElementById("deliveryType").value;
  let result = document.getElementById("deliveryPrice");

  if (wilaya && type) {
    let price = prices[wilaya][type];
    result.innerHTML = "سعر التوصيل: " + price + " دج";
  } else {
    result.innerHTML = "";
  }
}

function sendOrder(){
    let name = document.getElementById("name").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let wilaya = document.getElementById("wilaya").value;
    let delivery = document.getElementById("deliveryType").value;
    let ajwa = document.getElementById("ajwa").value;
    let honey = document.getElementById("honey").value;
    let zamzam = document.getElementById("zamzam").value;

    if(!name || !phone || !wilaya || !delivery) {
        alert("يرجى تعبئة جميع البيانات!");
        return;
    }

    let message = "طلب جديد:\n";
    if(ajwa>0) message += "عجوة المدينة: "+ajwa+"\n";
    if(honey>0) message += "عسل الحبة السوداء: "+honey+"\n";
    if(zamzam>0) message += "ماء زمزم: "+zamzam+"\n";
    message += "الاسم: "+name+"\nالهاتف: "+phone+"\nالولاية: "+wilaya+"\nنوع التوصيل: "+(delivery=="home"?"توصيل للمنزل":"توصيل لمكتب التوصيل");

    let url = "https://wa.me/213699091938?text=" + encodeURIComponent(message);
    window.open(url,"_blank");
}
</script>

</body>
