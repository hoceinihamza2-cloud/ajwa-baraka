<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عجوة البركة</title>
<style>
body { font-family: Arial; background: #fff8f0; margin:0; }
.header { background:#8b4513; color:white; text-align:center; padding:15px; font-size:22px; }
.container { max-width:500px; margin:auto; padding:15px; }
.product { background:white; margin-bottom:15px; padding:10px; border-radius:10px; box-shadow:0 0 5px #ccc; }
.product img { width:100%; border-radius:10px; }
.price { color:#8b4513; font-weight:bold; margin:5px 0; }
select, input { width:100%; padding:10px; margin-top:10px; border-radius:8px; border:1px solid #ccc; }
button { width:100%; padding:12px; background:#25d366; color:white; border:none; border-radius:10px; margin-top:15px; font-size:16px; cursor:pointer; }
</style>
</head>
<body>

<div class="header">🌾 عجوة البركة 🍯</div>

<div class="container">

<!-- عجوة المدينة -->
<div class="product">
<h3>✔️ عجوة المدينة الأصلية</h3>
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/Ajwa_dates.jpg">
<p class="price">4000 دج</p>
<select id="ajwa">
<option value="0">اختر الكمية</option>
<option>1</option><option>2</option><option>3</option><option>4</option>
</select>
</div>

<!-- عسل -->
<div class="product">
<h3>✔️ عسل الحبة السوداء الطبيعي</h3>
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3b/Honey.jpg">
<p class="price">4500 دج</p>
<select id="honey">
<option value="0">اختر الكمية</option>
<option>1</option><option>2</option><option>3</option><option>4</option>
</select>
</div>

<!-- زمزم -->
<div class="product">
<h3>✔️ ماء زمزم المبارك</h3>
<img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Water_bottle.jpg">
<p class="price">4500 دج</p>
<select id="zamzam">
<option value="0">اختر الكمية</option>
<option>1</option><option>2</option><option>3</option><option>4</option>
</select>
</div>

<!-- بيانات -->
<input type="text" id="name" placeholder="الاسم الكامل">
<input type="tel" id="phone" placeholder="📞 رقم الهاتف">

<!-- 🚚 التوصيل الجديد -->
<div class="product">
  <h3>🚚 معلومات التوصيل</h3>

  <select id="wilaya" onchange="updatePrice()">
    <option value="">اختر الولاية</option>
    <option value="Adrar">01 - أدرار</option>
    <option value="Chlef">02 - الشلف</option>
    <option value="Laghouat">03 - الأغواط</option>
    <option value="Blida">09 - البليدة</option>
    <option value="Alger">16 - الجزائر</option>
    <option value="Oran">31 - وهران</option>
  </select>

  <select id="deliveryType" onchange="updatePrice()">
    <option value="">نوع التوصيل</option>
    <option value="home">توصيل للمنزل</option>
    <option value="desk">توصيل لمكتب التوصيل</option>
  </select>

  <div id="deliveryPrice" style="margin-top:10px; font-weight:bold;"></div>
</div>

<button onclick="sendOrder()">اطلب الآن عبر واتساب</button>

</div>

<script>
// الأسعار
const prices = {
  Adrar: { home: 1400, desk: 1100 },
  Chlef: { home: 850, desk: 450 },
  Laghouat: { home: 1000, desk: 700 },
  Blida: { home: 500, desk: 400 },
  Alger: { home: 700, desk: 400 },
  Oran: { home: 850, desk: 450 }
};

// حساب السعر
function updatePrice() {
  let wilaya = document.getElementById("wilaya").value;
  let type = document.getElementById("deliveryType").value;
  let result = document.getElementById("deliveryPrice");

  if (wilaya && type) {
    let price = prices[wilaya][type];
    result.innerHTML = "سعر التوصيل: " + price + " دج";
  } else {
    result.innerHTML = "";
  }
}

// إرسال الطلب
function sendOrder(){
    let name = document.getElementById("name").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let wilaya = document.getElementById("wilaya").value;
    let type = document.getElementById("deliveryType").value;
    let ajwa = document.getElementById("ajwa").value;
    let honey = document.getElementById("honey").value;
    let zamzam = document.getElementById("zamzam").value;

    if(!name || !phone || !wilaya || !type) {
        alert("يرجى تعبئة جميع البيانات!");
        return;
    }

    let message = "طلب جديد:\n";
    if(ajwa>0) message += "عجوة: "+ajwa+"\n";
    if(honey>0) message += "عسل: "+honey+"\n";
    if(zamzam>0) message += "زمزم: "+zamzam+"\n";

    message += "الاسم: "+name+"\nالهاتف: "+phone;
    message += "\nالولاية: "+wilaya;
    message += "\nنوع التوصيل: " + (type=="home" ? "منزل" : "مكتب");

    let url = "https://wa.me/213699091938?text=" + encodeURIComponent(message);
    window.open(url, "_blank");
}
</script>

</body>
</html>
